<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="binary.css">
</head>

<body>
    <header class="app-header">
        <div class="app-logo">
            Dashboard
        </div>

        <nav class="nav-menu">

            <button class="nav-toggle" id="navToggle">
                Menu ▾
            </button>

            <div class="dropdown" id="dropdownMenu">
                <a href="../Binary/binary.html">Binary</a>
                <a href="text-to-image.html">Text-To-Image</a>
                <a href="face-crop.html">Face-Crop</a>
            </div>

        </nav>
    </header>

    <div class="layout">

        <!-- LEFT PANEL -->
        <div class="left">
            <h2>Binary Workflow</h2>

            <!-- RESPONSE A -->
            <div class="section" id="responseA">
                <div class="section-header" data-group="A">
                    <h3>Response A</h3>
                    <span class="toggle">-</span>
                </div>

                <div class="section-body">
                    <div class="checkbox-group">
                        <label><input type="checkbox" data-group="A" value="Better range in pitch variation">Better
                            range in
                            pitch variation</label>
                        <label><input type="checkbox" data-group="A" value="Better emphasis on words">Better emphasis on
                            words</label>
                        <label><input type="checkbox" data-group="A" value="Better voice consistency">Better voice
                            consistency</label>
                    </div>
                </div>

                <div class="custom-row">
                    <input id="customA" placeholder="Add custom...">
                    <button class="add-btn" data-group="A">Add</button>
                </div>
            </div>

            <!-- RESPONSE B -->
            <div class="section" id="responseB">
                <div class="section-header" data-group="B">
                    <h3>Response B</h3>
                    <span class="toggle">-</span>
                </div>

                <div class="section-body">
                    <div class="checkbox-group">
                        <label><input type="checkbox" data-group="B" value="Better range in pitch variation">Better
                            range in
                            pitch variation</label>
                        <label><input type="checkbox" data-group="B" value="Better emphasis on words">Better emphasis on
                            words</label>
                        <label><input type="checkbox" data-group="B" value="Better voice consistency">Better voice
                            consistency</label>
                    </div>
                </div>

                <div class="custom-row">
                    <input id="customB" placeholder="Add custom...">
                    <button class="add-btn" data-group="B">Add</button>
                </div>
            </div>

            <!-- COMMENTS -->
            <div class="section" id="responseC">
                <div class="section-header" data-group="C">
                    <h3>Comments</h3>
                    <span class="toggle">-</span>
                </div>

                <div class="section-body">
                    <div class="checkbox-group">
                        <label><input type="checkbox" data-group="C" value="Add Comments">Add Comments</label>
                    </div>
                </div>

                <div class="custom-row">
                    <input id="customC" placeholder="Add comment...">
                    <button class="add-btn" data-group="C">Add</button>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right">

            <div class="right-columns">

                <!-- LEFT PANEL -->
                <div class="panel">
                    <h3>Selected Feedback</h3>

                    <div class="panel-body">
                        <textarea id="output"></textarea>
                    </div>

                    <div class="panel-footer">
                        <button class="btn copy">Copy</button>
                        <button class="btn clear">Clear</button>
                    </div>
                </div>

                <!-- RIGHT PANEL -->
                <div class="panel">
                    <h3>Notepad</h3>

                    <div class="panel-body">
                        <textarea id="notepad" placeholder="Write notes here..."></textarea>
                    </div>

                    <!-- empty footer to match height -->
                    <div class="panel-footer"></div>
                </div>

            </div>

            <!-- LOGOUT -->
            <div class="actions">
                <button class="btn logout" id="logoutBtn">Logout</button>
            </div>

        </div>

        <!-- <script type="module" src="../auth.js"></script> -->
        <script type="module" src="../app.js"></script>
        <script type="module" src="../binary.js"></script>
        <script type="module" src="../menu.js"></script>

</body>

</html>
