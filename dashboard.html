<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="layout">

  <!-- LEFT -->
  <div class="left">
    <h2>Binary Workflow</h2>

    <!-- RESPONSE A -->
    <div class="section" id="responseA">
      <h3>Response A</h3>
      <div class="checkbox-group">
        <label><input type="checkbox" data-group="A" value="Better range in pitch variation">Better range in pitch variation</label>
        <label><input type="checkbox" data-group="A" value="Better emphasis on words">Better emphasis on words</label>
        <label><input type="checkbox" data-group="A" value="Better voice consistency">Better voice consistency</label>
      </div>

      <input id="customA" placeholder="Add custom...">
      <button class="add-btn" onclick="addCustom('A')">Add</button>
    </div>

    <!-- RESPONSE B -->
    <div class="section" id="responseB">
      <h3>Response B</h3>
      <div class="checkbox-group">
        <label><input type="checkbox" data-group="B" value="Better range in pitch variation">Better range in pitch variation</label>
        <label><input type="checkbox" data-group="B" value="Better emphasis on words">Better emphasis on words</label>
        <label><input type="checkbox" data-group="B" value="Better voice consistency">Better voice consistency</label>
      </div>

      <input id="customB" placeholder="Add custom...">
      <button class="add-btn" onclick="addCustom('B')">Add</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h3>Selected Feedback</h3>

    <textarea id="output"></textarea>

    <div class="actions">
      <button class="btn copy" onclick="copyText()">Copy</button>
      <button class="btn clear" onclick="clearAll()">Clear</button>
    </div>
  </div>

</div>

<script type="module" src="auth.js"></script>
<script type="module" src="app.js"></script>

<script>
  function updateOutput() {
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    const grouped = { A: [], B: [] };

    checkboxes.forEach(cb => {
      if (cb.checked) {
        grouped[cb.dataset.group].push(cb.value);
      }
    });

    let result = "";

    if (grouped.A.length) {
      result += "Response A:\n";
      grouped.A.forEach(i => result += "- " + i + "\n");
      result += "\n";
    }

    if (grouped.B.length) {
      result += "Response B:\n";
      grouped.B.forEach(i => result += "- " + i + "\n");
    }

    document.getElementById("output").value = result.trim();
  }

  document.addEventListener("change", e => {
    if (e.target.type === "checkbox") updateOutput();
  });

  function addCustom(group) {
    const input = document.getElementById("custom" + group);
    const value = input.value.trim();
    if (!value) return;

    const container = document.querySelector(`#response${group} .checkbox-group`);

    const label = document.createElement("label");
    label.innerHTML = `<input type="checkbox" data-group="${group}" value="${value}">${value}`;

    container.appendChild(label);
    input.value = "";
  }

  function copyText() {
    const output = document.getElementById("output");
    output.select();
    document.execCommand("copy");
  }

  function clearAll() {
    document.getElementById("output").value = "";
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
  }
</script>

</body>
</html>
