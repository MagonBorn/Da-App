<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .layout {
      display: flex;
      height: 100vh;
    }

    .left {
      width: 40%;
      padding: 20px;
      background: #f4f4f4;
      overflow-y: auto;
    }

    .right {
      width: 60%;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    .section {
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 300px;
      padding: 10px;
      font-size: 14px;
    }

    button {
      margin-top: 10px;
      margin-right: 10px;
      padding: 10px;
      cursor: pointer;
    }

    label {
      display: block;
      margin: 5px 0;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- LEFT SIDE -->
  <div class="left">
    <h2>Binary Workflow</h2>

    <div class="section">
      <h3>Response A</h3>
      <label><input type="checkbox" value="Response A: Better range in pitch variation"> Better range in pitch variation</label>
      <label><input type="checkbox" value="Response A: Better emphasis on words"> Better emphasis on words</label>
      <label><input type="checkbox" value="Response A: Better voice consistency"> Better voice consistency</label>
    </div>

    <div class="section">
      <h3>Response B</h3>
      <label><input type="checkbox" value="Response B: Better range in pitch variation"> Better range in pitch variation</label>
      <label><input type="checkbox" value="Response B: Better emphasis on words"> Better emphasis on words</label>
      <label><input type="checkbox" value="Response B: Better voice consistency"> Better voice consistency</label>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <h3>Selected Feedback</h3>

    <textarea id="output"></textarea>

    <br>

    <button onclick="copyText()">Copy</button>
    <button onclick="clearText()">Clear</button>
  </div>

</div>

<script type="module" src="auth.js"></script>
<script type="module" src="app.js"></script>

<script>
  const checkboxes = document.querySelectorAll('input[type="checkbox"]');
  const output = document.getElementById("output");

  checkboxes.forEach(cb => {
    cb.addEventListener("change", () => {
      updateOutput();
    });
  });

  function updateOutput() {
    const selected = [];

    checkboxes.forEach(cb => {
      if (cb.checked) {
        selected.push(cb.value);
      }
    });

    output.value = selected.join("\n");
  }

  function copyText() {
    output.select();
    document.execCommand("copy");
    alert("Copied to clipboard!");
  }

  function clearText() {
    output.value = "";
    checkboxes.forEach(cb => cb.checked = false);
  }
</script>

</body>
</html>
